pm_l2_flow_tz:
  architecture:
    flow_type: "flowise_single_orchestrator_simulation_flow"

    description: >
      FlowiseAI-based orchestration flow implementing a SIMULATED PM execution cycle.
      All role separation, immutability, and sub-chat behavior are logical constructs only.
      Flowise executes a single LLM-driven pipeline with routing and structured outputs.

    canonical_source:
      - Seed Canon v1

    execution_model:
      type: "flowise_single_flow_simulation"
      subchat_isolation: false
      note: >
        Role isolation is logical and contractual only.
        Flowise does NOT provide true isolated agents or runtime separation between roles.
        All roles are simulated via prompts and structured outputs inside a single execution flow.

  nodes:
    - id: chat_trigger_pm_l1
      type: "Webhook / Chat Trigger"
      output: raw_input_payload

    - id: input_normalizer
      type: "Custom JS Function"
      purpose: "Normalize input into structured task package"
      output:
        task_package:
          task_id: "generated"
          root_task_id: "generated"
          task_type: "classified"
          correlation_id: "generated"
          schema_version: "v1"

    - id: context_builder
      type: "Set Variables"
      purpose: "Build logical (non-enforced) immutable context package"
      output:
        context_package:
          context_id: "generated"
          version: "v1"
          immutability: "logical_only"
          warning: "Flowise does not enforce immutability; state may mutate across nodes"

    - id: pm_l2_router
      type: "Rule-based Router (primary) + LLM fallback"
      routing_logic:
        primary:
          type: "deterministic_rules"
          rules:
            - if: "task_type == analysis"
              route: "analysis_lane"
            - if: "task_type == execution"
              route: "execution_lane"
            - if: "task_type == validation"
              route: "validation_lane"
            - default: "generic_lane"

        fallback:
          type: "LLM_classifier"
          condition: "no_rule_match"

      note: >
        Rule-based routing is mandatory primary mechanism.
        LLM routing is fallback only and non-authoritative.

    - id: pm_l3_dispatcher
      type: "LLM"
      purpose: "Simulate PM L3 planning and role_task generation"
      output:
        role_task:
          role_task_id: "generated"
          task_id: "from_input"
          role_id: "PM_L3_DELIVERY_VALIDATION_OWNER"
          correlation_id: "propagated"
          schema_version: "v1"
          task_payload: "structured_subtask"
          approved_scope: "defined_minimal_scope"
          forbidden_scope: "external_systems_and_runtime"

    - id: subchat_simulation_executor
      type: "LLM"
      purpose: >
        Simulated execution of Sub-chat roles.
        No true isolation exists; this is a prompt-level role emulation.
      output:
        role_output:
          role_task_id: "propagated"
          role_id: "dynamic"
          task_id: "propagated"
          correlation_id: "propagated"
          schema_version: "v1"
          result: "structured_output"
          alignment_with_root_task: true
          blockers: []

    - id: pm_l3_aggregator
      type: "LLM"
      purpose: "Aggregate simulated role outputs into PM L3 response"
      output:
        pm_l3_response:
          task_id: "propagated"
          correlation_id: "propagated"
          schema_version: "v1"
          status: "aggregated"
          evidence_summary: "compact_structured_summary"
          next_decision: "single_deterministic_action"

    - id: pm_l2_formatter
      type: "Set Variables"
      purpose: "Format final response for PM L2 consumption"
      output:
        final_response:
          task_id: "propagated"
          correlation_id: "propagated"
          schema_version: "v1"
          structure: "contracted"
          includes:
            - pm_l3_response
            - blockers
            - next_step

  routing_logic:
    role_id_resolution:
      type: "deterministic_first"
      primary:
        method: "rule_engine"
      secondary:
        method: "llm_classification"
        constraint: "only_if_no_rule_match"

    determinism_rules:
      - "routing must not depend on probabilistic LLM output when rules exist"
      - "same input task_type must always map to same lane"
      - "correlation_id must propagate across all nodes"

  assumptions:
    - "Flowise executes single-flow LLM pipeline without true agent isolation"
    - "All role separation is simulated via prompts and schemas"
    - "No durable state enforcement is provided by Flowise core"
    - "Immutability is conceptual only"