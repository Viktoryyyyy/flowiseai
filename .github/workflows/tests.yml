name: tests

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema PyYAML

      - name: Run JSON schema contract tests
        run: python -m pytest tests/contract/test_json_schemas.py

      - name: Run YAML contract tests
        run: python -m pytest tests/contract/test_yaml_contracts.py

      - name: Run required bootstrap file tests
        run: python -m pytest tests/contract/test_required_bootstrap_files.py
